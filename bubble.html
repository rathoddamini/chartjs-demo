<!DOCTYPE html>
<html>
<head>
  <title>Advanced Bubble Chart</title>

  <!-- ✅ Required for Looker Studio -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: Arial;
    }

    .chart-container {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart');

// ✅ Multiple datasets (Customer, Sales, Product)
const data = {
  datasets: [
    {
      label: 'Customers',
      data: [
        { x: 10, y: 20, r: 10 },
        { x: 15, y: 25, r: 12 },
        {x: 18, y: 26, r: 15 }
      ],
      backgroundColor: 'rgba(54, 162, 235, 0.5)'
    },
    {
      label: 'Sales',
      data: [
        { x: 20, y: 30, r: 15 },
        { x: 25, y: 35, r: 10 }
      ],
      backgroundColor: 'rgba(255, 99, 132, 0.5)'
    },
    {
      label: 'Products',
      data: [
        { x: 5, y: 10, r: 8 },
        { x: 12, y: 18, r: 14 }
      ],
      backgroundColor: 'rgba(255, 206, 86, 0.5)'
    }
  ]
};

// ✅ Config
const config = {
  type: 'bubble',
  data: data,
  options: {
    responsive: true,
    maintainAspectRatio: false,

    plugins: {
      legend: {
        position: 'top'
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            const d = context.raw;
            return `${context.dataset.label} → X:${d.x}, Y:${d.y}, Size:${d.r}`;
          }
        }
      }
    },

    scales: {
      x: {
        title: {
          display: true,
          text: 'Revenue / Value'
        }
      },
      y: {
        title: {
          display: true,
          text: 'Customers / Count'
        }
      }
    }
  }
};

// ✅ Create Chart
const myChart = new Chart(ctx, config);

// ✅ Resize fix
window.addEventListener('resize', () => {
  myChart.resize();
});
</script>

</body>
</html>
