<!DOCTYPE html>
<html>
<head>
  <title>Polar Area Chart</title>

  <!-- ✅ Required for Looker Studio Embed -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .chart-container {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart');

// ✅ Data (you can replace with dynamic later)
const data = {
  labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple'],
  datasets: [{
    label: 'Dataset',
    data: [11, 16, 7, 14, 10],
    backgroundColor: [
      'rgba(255, 99, 132, 0.6)',
      'rgba(54, 162, 235, 0.6)',
      'rgba(255, 206, 86, 0.6)',
      'rgba(75, 192, 192, 0.6)',
      'rgba(153, 102, 255, 0.6)'
    ]
  }]
};

// ✅ Config
const config = {
  type: 'polarArea',
  data: data,
  options: {
    responsive: true,
    maintainAspectRatio: false,

    plugins: {
      legend: {
        position: 'right'
      },
      tooltip: {
        enabled: true
      }
    },

    scales: {
      r: {
        beginAtZero: true
      }
    },

    animation: {
      duration: 800
    }
  }
};

// ✅ Create Chart
const myChart = new Chart(ctx, config);

// ✅ Fix resize inside iframe
window.addEventListener('resize', () => {
  myChart.resize();
});
</script>

</body>
</html>
