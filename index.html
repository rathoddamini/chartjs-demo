<!DOCTYPE html>
<html>
<head>
  <title>Advanced Radar Chart</title>

  <!-- ✅ Important for Looker Embed -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    .chart-container {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart');

// ✅ More labels (10+)
const labels = [
  'Jan', 'Feb', 'Mar', 'Apr', 'May',
  'Jun', 'Jul', 'Aug', 'Sep', 'Oct'
];

// ✅ Multiple datasets
const data = {
  labels: labels,
  datasets: [
    {
      label: 'Sales 2024',
      data: [10, 20, 15, 25, 60, 55, 40, 35, 50, 65],
      fill: true,
      backgroundColor: 'rgba(54, 162, 235, 0.2)',
      borderColor: 'rgb(54, 162, 235)',
      pointBackgroundColor: 'rgb(54, 162, 235)'
    },
    {
      label: 'Sales 2025',
      data: [15, 25, 20, 30, 55, 60, 45, 40, 55, 70],
      fill: true,
      backgroundColor: 'rgba(255, 99, 132, 0.2)',
      borderColor: 'rgb(255, 99, 132)',
      pointBackgroundColor: 'rgb(255, 99, 132)'
    },
    {
      label: 'Target',
      data: [20, 30, 25, 35, 65, 70, 50, 45, 60, 75],
      fill: false,
      borderColor: 'rgb(75, 192, 192)',
      pointBackgroundColor: 'rgb(75, 192, 192)'
    }
  ]
};

// ✅ Config
const config = {
  type: 'radar',
  data: data,
  options: {
    responsive: true,
    maintainAspectRatio: false,

    plugins: {
      legend: {
        position: 'top'
      }
    },

    scales: {
      r: {
        beginAtZero: true,
        ticks: {
          stepSize: 10
        }
      }
    },

    animation: {
      duration: 800
    }
  }
};

// ✅ Create chart
const myChart = new Chart(ctx, config);

// ✅ Resize fix for Looker embed
window.addEventListener('resize', () => {
  myChart.resize();
});
</script>

</body>
</html>
