<!DOCTYPE html>
<html>
<head>
  <title>Scatter Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Sales Scatter Chart</h2>
<canvas id="myChart"></canvas>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'scatter',
  data: {
    datasets: [{
      label: 'Sales',
      data: [
        { x: 1, y: 10 },
        { x: 2, y: 20 },
        { x: 3, y: 15 },
        { x: 4, y: 25 }
      ],
      backgroundColor: 'blue'
    }]
  },
  options: {
    scales: {
      x: {
        title: {
          display: true,
          text: 'Month Index'
        }
      },
      y: {
        title: {
          display: true,
          text: 'Sales'
        }
      }
    }
  }
});
</script>

</body>
</html>
